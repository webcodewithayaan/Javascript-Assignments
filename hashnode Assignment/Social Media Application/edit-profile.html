<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --glass-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }
        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            --glass-card: #ffffff;
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--text-main); }
        
        .edit-card { background: var(--glass-card); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); border-radius: 20px; width: 100%; max-width: 550px; padding: 35px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .edit-header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .edit-header h2 { font-size: 1.5rem; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        .form-control { width: 100%; padding: 12px; background: rgba(0,0,0,0.1); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-main); font-size: 0.95rem; outline: none; }
        [data-theme="light"] .form-control { background: rgba(255,255,255,0.6); }
        
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-cancel { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); padding: 12px 25px; border-radius: 10px; text-decoration: none; font-size: 0.95rem; font-weight: 600; margin-right: 10px;}
    </style>
</head>
<body>

    <div class="edit-card">
        <div class="edit-header">
            <h2>Modify Profile Parameters</h2>
            <i class="fas fa-user-edit" style="color:var(--accent); font-size:1.3rem;"></i>
        </div>

        <form id="editProfileForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="editFullName" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Bio / Description</label>
                <textarea id="editBio" class="form-control" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Profile Picture URL</label>
                <input type="text" id="editProfilePic" class="form-control">
            </div>
            <div class="form-group">
                <label>Cover Photo URL</label>
                <input type="text" id="editCoverPhoto" class="form-control">
            </div>

            <div style="display:flex; justify-content: flex-end; margin-top: 30px;">
                <a href="profile.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-save">Save Changes</button>
            </div>
        </form>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentUser) { window.location.href = 'login.html'; }

        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        // Autofill current configurations state 
        document.getElementById('editFullName').value = currentUser.fullName;
        document.getElementById('editBio').value = currentUser.bio || '';
        document.getElementById('editProfilePic').value = currentUser.profilePic;
        document.getElementById('editCoverPhoto').value = currentUser.coverPhoto;

        // Process data mutation save system pipeline 
        document.getElementById('editProfileForm').addEventListener('submit', (e) => {
            e.preventDefault();

            currentUser.fullName = document.getElementById('editFullName').value.trim();
            currentUser.bio = document.getElementById('editBio').value.trim();
            currentUser.profilePic = document.getElementById('editProfilePic').value.trim();
            currentUser.coverPhoto = document.getElementById('editCoverPhoto').value.trim();

            // Update session pointer identity database configurations array maps 
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            let users = JSON.parse(localStorage.getItem('users')) || [];
            users = users.map(u => u.id === currentUser.id ? currentUser : u);
            localStorage.setItem('users', JSON.stringify(users));

            // Sync updated profile image/name across user's past posts
            let posts = JSON.parse(localStorage.getItem('posts')) || [];
            posts = posts.map(p => {
                if(p.userId === currentUser.id) {
                    p.authorName = currentUser.fullName;
                    p.avatar = currentUser.profilePic;
                }
                return p;
            });
            localStorage.setItem('posts', JSON.stringify(posts));

            alert('Profile updated successfully!');
            window.location.href = 'profile.html';
        });
    </script>
</body>
</html>
