<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Feed </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }
        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f8fafc, #e2e8f0);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-card: #ffffff;
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; color: var(--text-main); overflow-x: hidden; }

        /* Multi Column Grid Dashboard Layout */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr 350px;
            max-width: 1400px;
            margin: 0 auto;
            gap: 25px;
            padding: 25px 15px;
            min-height: 100vh;
        }

        /* Sidebar Architecture */
        .sidebar-left, .sidebar-right {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            height: fit-content;
            position: sticky;
            top: 25px;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu { list-style: none; }
        .nav-item a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-item.active a, .nav-item a:hover {
            background: var(--accent);
            color: #fff;
        }

        /* Center Main Feed Content */
        .feed-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Creation Card Box */
        .create-post-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .create-header { display: flex; gap: 15px; margin-bottom: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .create-input {
            width: 100%;
            background: rgba(0,0,0,0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            resize: none;
            outline: none;
        }
        [data-theme="light"] .create-input { background: rgba(255,255,255,0.7); }
        
        .create-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .media-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-submit-post {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Standardized Post Architecture */
        .post-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }
        .post-author-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .author-meta h4 { font-weight: 600; font-size: 1rem; }
        .author-meta span { color: var(--text-muted); font-size: 0.8rem; }
        .post-caption { margin-bottom: 15px; line-height: 1.5; font-size: 0.95rem; }
        .post-media-box { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; background: #000; max-height: 450px;}
        .post-media-box img, .post-media-box video { width: 100%; height: auto; display: block; object-fit: cover; }
        
        .post-stats-actions {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
        }
        .action-link {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-link.liked { color: var(--accent); }

        /* Right Sidebar Component Elements */
        .suggestion-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .btn-follow {
            background: var(--text-main);
            color: var(--bg-gradient);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Bottom Nav Panel for Mobile UI Setup */
        .bottom-nav { display: none; }

        /* Media Responsive Operations */
        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 80px 1fr; }
            .sidebar-right, .nav-text, .brand-logo span { display: none; }
            .sidebar-left { padding: 15px 5px; align-items: center; }
            .nav-item a { justify-content: center; padding: 15px; }
        }

        @media (max-width: 680px) {
            .app-container { grid-template-columns: 1fr; padding-bottom: 90px; margin-top: 50px;}
            .sidebar-left { display: none; }
            .bottom-nav {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: var(--glass-card);
                border-top: 1px solid var(--glass-border);
                backdrop-filter: blur(20px);
                justify-content: space-around;
                padding: 12px;
                z-index: 999;
            }
            .bottom-nav a { color: var(--text-muted); font-size: 1.3rem; }
            .bottom-nav a.active { color: var(--accent); }
        }
    </style>
</head>
<body>

    <div class="bottom-nav">
        <a href="index.html" class="active"><i class="fas fa-home"></i></a>
        <a href="gallery.html"><i class="fas fa-images"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>
        <a href="#" id="mobileLogout"><i class="fas fa-sign-out-alt"></i></a>
    </div>

    <div class="app-container">
        aside class="sidebar-left">
            <div class="brand-logo">
                <i class="fas fa-mug-hot"></i> <span>Elixir Hub</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active"><a href="index.html"><i class="fas fa-home"></i> <span class="nav-text">Home Feed</span></a></li>
                <li class="nav-item"><a href="profile.html"><i class="fas fa-user"></i> <span class="nav-text">My Profile</span></a></li>
                <li class="nav-item"><a href="gallery.html"><i class="fas fa-images"></i> <span class="nav-text">Media Gallery</span></a></li>
                <li class="nav-item"><a href="settings.html"><i class="fas fa-cog"></i> <span class="nav-text">Settings</span></a></li>
                <li class="nav-item" style="margin-top: 40px;">
                    <a href="#" id="btnLogout" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> <span class="nav-text">Logout</span></a>
                </li>
            </ul>
        </aside>

        <main class="feed-section">
            <div class="create-post-card">
                <div class="create-header">
                    <img src="" id="userSessionAvatar" class="avatar" alt="User">
                    <textarea class="create-input" id="postText" rows="3" placeholder="What's brewing in your mind?"></textarea>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="postImageMock" class="create-input" style="padding: 6px; font-size: 0.85rem;" placeholder="Paste Photo URL (Optional)">
                    <input type="text" id="postVideoMock" class="create-input" style="padding: 6px; font-size: 0.85rem;" placeholder="Paste Video URL (Optional)">
                </div>
                <div class="create-actions">
                    <div style="color: var(--text-muted); font-size: 0.85rem;"><i class="fas fa-info-circle"></i> Local Storage Media Input</div>
                    <button class="btn-submit-post" id="btnPublish">Publish Post</button>
                </div>
            </div>

            <div id="dynamicFeedDeck" class="feed-section"></div>
        </main>

        <aside class="sidebar-right">
            <h3 style="font-size: 1.1rem; font-weight:600; margin-bottom: 15px;">Suggestions for You</h3>
            <div id="suggestionBoxDeck"></div>
        </aside>
    </div>

    <script>
        // Security Gate check
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentUser) { window.location.href = 'login.html'; }

        // Setup Interface Data
        document.getElementById('userSessionAvatar').src = currentUser.profilePic;

        // Theme initialization Engine
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);

        // Core dynamic operations system logic setup 
        let posts = JSON.parse(localStorage.getItem('posts')) || [];
        let users = JSON.parse(localStorage.getItem('users')) || [];

        // Publish Post Handler
        document.getElementById('btnPublish').addEventListener('click', () => {
            const text = document.getElementById('postText').value.trim();
            const imgUrl = document.getElementById('postImageMock').value.trim();
            const videoUrl = document.getElementById('postVideoMock').value.trim();

            if(!text && !imgUrl && !videoUrl) return alert('Cannot broadcast empty content records!');

            const newPost = {
                id: Date.now().toString(),
                userId: currentUser.id,
                authorName: currentUser.fullName,
                authorUser: currentUser.username,
                avatar: currentUser.profilePic,
                caption: text,
                image: imgUrl || null,
                video: videoUrl || null,
                timestamp: new Date().toLocaleString(),
                likes: []
            };

            posts.unshift(newPost);
            localStorage.setItem('posts', JSON.stringify(posts));
            
            // Clear inputs
            document.getElementById('postText').value = '';
            document.getElementById('postImageMock').value = '';
            document.getElementById('postVideoMock').value = '';

            renderFeed();
        });

        // Global Cross User Renderer Framework
        function renderFeed() {
            const container = document.getElementById('dynamicFeedDeck');
            container.innerHTML = '';

            if(posts.length === 0) {
                container.innerHTML = `<div class='post-card' style='text-align:center; color: var(--text-muted);'>No posts found in database. Create the first one!</div>`;
                return;
            }

            posts.forEach(post => {
                const isLiked = post.likes.includes(currentUser.id) ? 'liked' : '';
                let mediaHtml = '';

                if(post.image) {
                    mediaHtml = `<div class="post-media-box"><img src="${post.image}" alt="Post Media"></div>`;
                } else if(post.video) {
                    mediaHtml = `<div class="post-media-box"><video src="${post.video}" controls></video></div>`;
                }

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-author-row">
                        <div style="display:flex; gap:12px; align-items:center;">
                            <img src="${post.avatar}" class="avatar" alt="Avatar">
                            <div class="author-meta">
                                <h4>${post.authorName}</h4>
                                <span>@${post.authorUser}</span>
                            </div>
                        </div>
                        <div style="font-size:0.8rem; color:var(--text-muted);">${post.timestamp}</div>
                    </div>
                    <div class="post-caption">${post.caption}</div>
                    ${mediaHtml}
                    <div class="post-stats-actions">
                        <button class="action-link ${isLiked}" onclick="toggleLike('${post.id}')">
                            <i class="fas fa-heart"></i> <span>${post.likes.length} Likes</span>
                        </button>
                        <button class="action-link" onclick="alert('Comment functionality simulation storage triggered!')">
                            <i class="fas fa-comment"></i> Comment
                        </button>
                        <button class="action-link" onclick="alert('Link copied to clipboard!')">
                            <i class="fas fa-share"></i> Share
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Toggle Like engine algorithm setup 
        window.toggleLike = function(postId) {
            posts = posts.map(p => {
                if(p.id === postId) {
                    if(p.likes.includes(currentUser.id)) {
                        p.likes = p.likes.filter(id => id !== currentUser.id);
                    } else {
                        p.likes.push(currentUser.id);
                    }
                }
                return p;
            });
            localStorage.setItem('posts', JSON.stringify(posts));
            renderFeed();
        };

        // Render Sidebar Suggestions data engine
        function renderSuggestions() {
            const box = document.getElementById('suggestionBoxDeck');
            box.innerHTML = '';
            
            // Exclude current logged in user
            const filteredUsers = users.filter(u => u.id !== currentUser.id).slice(0, 5);

            if(filteredUsers.length === 0) {
                box.innerHTML = `<p style="color:var(--text-muted); font-size:0.9rem;">No other members discovered.</p>`;
                return;
            }

            filteredUsers.forEach(u => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerHTML = `
                    <div style="display:flex; gap:10px; align-items:center;">
                        <img src="${u.profilePic}" class="avatar" style="width:35px; height:35px;" alt="User">
                        <div>
                            <h5 style="font-size:0.85rem; font-weight:600;">${u.fullName}</h5>
                            <span style="font-size:0.75rem; color:var(--text-muted);">@${u.username}</span>
                        </div>
                    </div>
                    <button class="btn-follow" onclick="alert('Follow link registered successfully!')">Follow</button>
                `;
                box.appendChild(item);
            });
        }

        // Logout Event Logic integration
        const logoutHandler = (e) => {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        };
        document.getElementById('btnLogout').addEventListener('click', logoutHandler);
        document.getElementById('mobileLogout').addEventListener('click', logoutHandler);

        // Run functions on load window state setup
        renderFeed();
        renderSuggestions();
    </script>
</body>
</html>
