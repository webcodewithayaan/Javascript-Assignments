<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --error: #ef4444;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .auth-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        [data-theme="light"] .form-control {
            background: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-auth:hover {
            background: var(--accent-hover);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--glass-border);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join our premium social hub</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="fullName" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <i class="fas fa-at"></i>
                <input type="text" id="username" class="form-control" placeholder="Username" required>
                <div class="error-msg" id="usernameError">Username already taken!</div>
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="form-group">
                <i class="fas fa-shield-alt"></i>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
                <div class="error-msg" id="passError">Passwords do not match!</div>
            </div>

            <button type="submit" class="btn-auth">Register</button>
        </form>

        <div class="divider">OR</div>

        <button class="btn-google" onclick="alert('Google Auth UI Only!')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_活跃观众_Icon.svg" width="18" alt="Google"> Continue with Google
        </button>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeToggle.innerHTML = currentTheme === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.innerHTML = newTheme === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // Registration Logic
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const usernameError = document.getElementById('usernameError');
            const passError = document.getElementById('passError');

            usernameError.style.display = 'none';
            passError.style.display = 'none';

            // Validate Passwords
            if(password !== confirmPassword) {
                passError.style.display = 'block';
                return;
            }

            // Get existing users
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Check if username exists
            if(users.some(user => user.username === username)) {
                usernameError.style.display = 'block';
                return;
            }

            // Create new user entity
            const newUser = {
                id: Date.now().toString(),
                fullName,
                username,
                email,
                password,
                profilePic: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150',
                coverPhoto: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800',
                bio: 'Premium Quality Content Creator.',
                followers: [],
                following: []
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            alert('Registration Successful! Redirecting to login...');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
