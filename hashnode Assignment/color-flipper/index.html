<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Flipper</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card">
    <h1 id="color-heading">Color Flipper</h1>
    <p class="hex-code" id="hex-code">#FFFFFF</p>

    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-hex" data-mode="hex">HEX</button>
      <button class="mode-btn" id="mode-rgb" data-mode="rgb">RGB</button>
    </div>

    <button class="flip-btn" id="btn-flip">Flip Color</button>

    <button class="copy-btn" id="btn-copy">Copy Code</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
