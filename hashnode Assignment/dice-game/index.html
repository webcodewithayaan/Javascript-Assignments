<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roll the Dice Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="game-wrapper">
    <button class="btn btn--new" id="btn-new">🔄 New Game</button>

    <section class="player player--0 player--active">
      <h2 class="name">Player 1</h2>
      <p class="score">0</p>
      <div class="current">
        <p class="current-label">Current</p>
        <p class="current-score">0</p>
      </div>
    </section>

    <section class="player player--1">
      <h2 class="name">Player 2</h2>
      <p class="score">0</p>
      <div class="current">
        <p class="current-label">Current</p>
        <p class="current-score">0</p>
      </div>
    </section>

    <img src="dice-5.png" alt="Playing dice" class="dice hidden">

    <button class="btn btn--roll" id="btn-roll">🎲 Roll Dice</button>
    <button class="btn btn--hold" id="btn-hold">📥 Hold</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
