<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess My Number!</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <div class="topbar">
      <button class="btn again" id="btn-again">Again!</button>
      <p class="between">(Between 1 and 20)</p>
    </div>

    <h1 class="title">Guess My Number!</h1>
    <p class="number" id="number">?</p>

    <hr>

    <main>
      <section class="left">
        <input type="number" id="guess" min="1" max="20" placeholder="?">
        <button class="btn check" id="btn-check">Check!</button>
      </section>

      <section class="right">
        <p class="message" id="message">Start guessing...</p>
        <p class="label-score">🎯 Score: <span id="score">20</span></p>
        <p class="label-highscore">🏆 Highscore: <span id="highscore">0</span></p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
