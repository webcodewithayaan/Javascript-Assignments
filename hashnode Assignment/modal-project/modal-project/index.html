<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Project</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="banner">
    <div class="banner-card">
      <h1>Modal Project</h1>
      <button class="btn-open" id="btn-open">Open Modal</button>
    </div>
  </div>

  <div class="modal-overlay" id="overlay"></div>
  <div class="modal" id="modal">
    <button class="btn-close" id="btn-close">✕</button>
    <h2>Modal Content</h2>
    <p>This is a simple modal window built with plain HTML, CSS and JavaScript. Click the ✕ or click outside the box to close it.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
