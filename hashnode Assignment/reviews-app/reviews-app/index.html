<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Reviews</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>Our Reviews</h1>

    <div class="card">
      <img src="" alt="" class="avatar" id="avatar">
      <h2 class="name" id="name"></h2>
      <p class="job" id="job"></p>
      <p class="quote" id="quote"></p>

      <div class="nav">
        <button id="btn-prev" aria-label="Previous review">&lt;</button>
        <button id="btn-next" aria-label="Next review">&gt;</button>
      </div>

      <button class="btn-surprise" id="btn-surprise">🎲 Surprise Me</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
