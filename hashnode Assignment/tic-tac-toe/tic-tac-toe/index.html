<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>Tic Tac Toe</h1>
    <p class="status" id="status">Player <span id="turn-indicator">X</span>'s turn</p>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="scoreboard">
      <div class="score-box">
        <p class="score-label">Player X</p>
        <p class="score-value" id="score-x">0</p>
      </div>
      <div class="score-box">
        <p class="score-label">Draws</p>
        <p class="score-value" id="score-draw">0</p>
      </div>
      <div class="score-box">
        <p class="score-label">Player O</p>
        <p class="score-value" id="score-o">0</p>
      </div>
    </div>

    <button class="btn-reset" id="btn-reset">🔄 New Round</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
