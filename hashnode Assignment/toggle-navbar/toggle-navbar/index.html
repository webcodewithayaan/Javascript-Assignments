<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toggle Navbar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="brand">Coding<span>Addict</span></div>

    <ul class="nav-links" id="nav-links">
      <button class="close-btn" id="btn-close">✕</button>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <div class="socials">
      <a href="#">📘</a>
      <a href="#">🐦</a>
      <a href="#">🎨</a>
      <a href="#">💼</a>
      <a href="#">📍</a>
    </div>

    <button class="btn-toggle" id="btn-toggle">☰</button>
  </nav>

  <div class="overlay" id="overlay"></div>

  <main class="content">
    <h1>Toggle Navbar Demo</h1>
    <p>Resize the window or shrink the screen to see the hamburger menu. Click it to slide the sidebar in/out.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
